name: Automate PR Summary

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: npm-publish-skedyul
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  copilot-requests: write

jobs:
  summarize-pr:
    if: >-
      github.event.pull_request.head.ref != 'master' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
      npm_dist_tag: ${{ steps.prerelease.outputs.npm_dist_tag }}
      head_ref: ${{ github.event.pull_request.head.ref }}
      version: ${{ steps.prerelease.outputs.version }}
      tag: ${{ steps.prerelease.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch base branch for diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git fetch origin "${{ github.event.pull_request.base.sha }}"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Copilot CLI
        run: npm install -g @github/copilot@latest

      - name: Check whether PR should be auto-updated
        id: guard
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if git log -1 --format=%s | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping automation for bot commit with [skip ci]."
            exit 0
          fi

          printf '%s' "$PR_BODY" > /tmp/pr-body.txt
          pnpm exec tsx scripts/changelog/validate-pr-template.ts --body-file /tmp/pr-body.txt --json > /tmp/validation.json

          COMPLIANT=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/validation.json','utf8')).compliant")
          SKIPPED=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/validation.json','utf8')).skipped")
          CLASSIFICATION=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/validation.json','utf8')).classification || ''")

          if [ "$SKIPPED" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping PR automation because skip marker is present."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE_SHA..$HEAD_SHA")
          RUN_DOCS=false
          if echo "$CHANGED" | grep -Eq '^(src/|docs/|package\.json)'; then
            RUN_DOCS=true
          fi

          SHOULD_UPDATE_TITLE=false
          SHOULD_UPDATE_BODY=false
          RUN_COPILOT=false

          if [ -z "$PR_TITLE" ] || [ "$PR_TITLE" = "$BRANCH_NAME" ]; then
            SHOULD_UPDATE_TITLE=true
            RUN_COPILOT=true
          fi
          if [ -z "$PR_BODY" ] || [ "$COMPLIANT" != "true" ]; then
            SHOULD_UPDATE_BODY=true
            RUN_COPILOT=true
          elif echo "$PR_BODY" | grep -q 'auto-generated by skedyul-changelog'; then
            SHOULD_UPDATE_BODY=true
            RUN_COPILOT=true
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "update_title=$SHOULD_UPDATE_TITLE" >> "$GITHUB_OUTPUT"
          echo "update_body=$SHOULD_UPDATE_BODY" >> "$GITHUB_OUTPUT"
          echo "run_copilot=$RUN_COPILOT" >> "$GITHUB_OUTPUT"
          echo "run_docs=$RUN_DOCS" >> "$GITHUB_OUTPUT"
          echo "update_labels=true" >> "$GITHUB_OUTPUT"
          echo "classification=$CLASSIFICATION" >> "$GITHUB_OUTPUT"

      - name: Generate PR summary and sync docs with Copilot
        if: steps.guard.outputs.skip != 'true'
        id: copilot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EXISTING_BODY: ${{ github.event.pull_request.body }}
          RUN_COPILOT: ${{ steps.guard.outputs.run_copilot }}
          RUN_DOCS: ${{ steps.guard.outputs.run_docs }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/changelog
          printf '%s' "$EXISTING_BODY" > /tmp/changelog/existing-pr-body.md

          PROMPT=$(cat <<'EOF'
          You are updating a pull request and SDK documentation for the skedyul npm package (skedyul-node).

          Context:
          - Base branch/ref: BASE_REF (BASE_SHA)
          - Head branch/ref: HEAD_REF (HEAD_SHA)
          - Pull request number: PR_NUMBER
          - Existing PR body: /tmp/changelog/existing-pr-body.md
          - RUN_COPILOT=RUN_COPILOT (if false, do not write /tmp/changelog/pr-*.txt files)
          - RUN_DOCS=RUN_DOCS (if false, skip README/docs edits)

          Instructions:
          1. Inspect git log BASE_SHA..HEAD_SHA and git diff BASE_SHA..HEAD_SHA.
          2. If RUN_COPILOT is true:
             - Write concise PR title (max 120 chars) to /tmp/changelog/pr-title.txt
             - Write plan-style PR body to /tmp/changelog/pr-body.md with sections: The Problem, Classification, Solution, Testing, Rollout notes
             - Start body with <!-- auto-generated by skedyul-changelog -->
             - Classification must be exactly one of: Bug Fix | New Feature | Infrastructure | Data Fix or Migration
             - Write classification alone to /tmp/changelog/pr-classification.txt
          3. If RUN_DOCS is true, update README.md, docs/README.md, and relevant docs/*.md for public SDK surface changes:
             - src/index.ts exports, package.json exports, CLI, config DSL, server entrypoints, schemas
             - Keep README version line accurate (prerelease suffix added later by automation)
             - Do not modify src/ except to fix doc examples if strictly necessary
          4. Preserve useful existing PR body content when regenerating.
          5. Do not commit, push, tag, or run gh pr edit.
          EOF
          )

          PROMPT="${PROMPT//BASE_REF/$BASE_REF}"
          PROMPT="${PROMPT//BASE_SHA/$BASE_SHA}"
          PROMPT="${PROMPT//HEAD_REF/$HEAD_REF}"
          PROMPT="${PROMPT//HEAD_SHA/$HEAD_SHA}"
          PROMPT="${PROMPT//PR_NUMBER/$PR_NUMBER}"
          PROMPT="${PROMPT//RUN_COPILOT/$RUN_COPILOT}"
          PROMPT="${PROMPT//RUN_DOCS/$RUN_DOCS}"

          set +e
          copilot --yolo -p "$PROMPT" \
            --allow-tool='shell(git:*)' \
            --allow-tool='shell(gh:*)' \
            --allow-tool=write
          COPILOT_EXIT=$?
          set -e

          if [ "$RUN_COPILOT" = "true" ]; then
            if [ $COPILOT_EXIT -ne 0 ] || [ ! -s /tmp/changelog/pr-title.txt ] || [ ! -s /tmp/changelog/pr-body.md ] || [ ! -s /tmp/changelog/pr-classification.txt ]; then
              echo "Copilot unavailable for PR summary; using git fallback." >&2
              pnpm exec tsx scripts/changelog/generate-pr-template-fallback.ts \
                --base "$BASE_SHA" --head "$HEAD_SHA" \
                --pr-number "$PR_NUMBER" \
                --pr-title "${{ github.event.pull_request.title }}" \
                --branch-name "$HEAD_REF" \
                --existing-body-file /tmp/changelog/existing-pr-body.md \
                --output-dir /tmp/changelog \
                --copilot-unavailable
            fi
            if ! grep -q 'auto-generated by skedyul-changelog' /tmp/changelog/pr-body.md; then
              sed -i '1i<!-- auto-generated by skedyul-changelog -->' /tmp/changelog/pr-body.md
            fi
            CLASSIFICATION=$(head -n 1 /tmp/changelog/pr-classification.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            echo "classification=$CLASSIFICATION" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump prerelease version
        if: steps.guard.outputs.skip != 'true'
        id: prerelease
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          RESULT=$(pnpm exec tsx scripts/release/prerelease-version.ts --pr-number "$PR_NUMBER" --write)
          echo "$RESULT" > /tmp/prerelease.json
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/prerelease.json','utf8')).nextVersion")
          TAG=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/prerelease.json','utf8')).tag")
          NPM_DIST_TAG=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/prerelease.json','utf8')).npmDistTag")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "npm_dist_tag=$NPM_DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Docs fallback when Copilot made no doc edits
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.run_docs == 'true'
        run: |
          set -euo pipefail
          if git diff --quiet README.md docs/ 2>/dev/null; then
            pnpm exec tsx scripts/release/generate-docs-fallback.ts \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}" \
              --version "${{ steps.prerelease.outputs.version }}"
          fi

      - name: Apply PR title and body
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.run_copilot == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE=$(head -n 1 /tmp/changelog/pr-title.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          ARGS=()
          if [ "${{ steps.guard.outputs.update_title }}" = "true" ] && [ -n "$TITLE" ]; then
            ARGS+=(--title "$TITLE")
          fi
          if [ "${{ steps.guard.outputs.update_body }}" = "true" ]; then
            ARGS+=(--body-file /tmp/changelog/pr-body.md)
          fi
          if [ ${#ARGS[@]} -gt 0 ]; then
            gh pr edit "${{ github.event.pull_request.number }}" "${ARGS[@]}"
          fi

      - name: Ensure classification labels exist
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.update_labels == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/changelog/ensure-pr-labels.sh

      - name: Apply classification labels
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.update_labels == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ steps.guard.outputs.run_copilot }}" = "true" ]; then
            CLASSIFICATION="${{ steps.copilot.outputs.classification }}"
          else
            CLASSIFICATION="${{ steps.guard.outputs.classification }}"
          fi
          if [ -z "$CLASSIFICATION" ]; then
            echo "No classification found to apply." >&2
            exit 1
          fi
          bash scripts/changelog/apply-pr-labels.sh "${{ github.event.pull_request.number }}" "$CLASSIFICATION"

      - name: Commit prerelease and docs to PR branch
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git add package.json README.md docs/ || true
          if git diff --cached --quiet; then
            echo "No doc or version changes to commit."
            exit 0
          fi
          git commit -m "chore: prerelease ${{ steps.prerelease.outputs.version }} + sync docs [skip ci]"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Tag prerelease version
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.prerelease.outputs.tag }}"
          VERSION="${{ steps.prerelease.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            EXISTING_SHA=$(git rev-list -n 1 "$TAG")
            if [ "$EXISTING_SHA" = "$(git rev-parse HEAD)" ]; then
              echo "Tag $TAG already points at HEAD."
              exit 0
            fi
            echo "Tag $TAG exists on different commit; skipping recreate." >&2
            exit 0
          fi
          git tag -a "$TAG" -m "skedyul prerelease $VERSION"
          git push origin "$TAG"

      - name: Prerelease summary
        if: steps.guard.outputs.skip != 'true'
        run: |
          {
            echo "### Prerelease \`skedyul@${{ steps.prerelease.outputs.version }}\`"
            echo ""
            echo "- npm dist-tag: \`${{ steps.prerelease.outputs.npm_dist_tag }}\` (not \`latest\`)"
            echo "- Pin in integration apps: \`\"skedyul\": \"${{ steps.prerelease.outputs.version }}\"\`"
            echo "- git tag: \`${{ steps.prerelease.outputs.tag }}\`"
            echo "- npm publish runs in \`publish.yml\` (trusted publisher workflow)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify no unexpected source changes
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          UNEXPECTED=$(git status --porcelain | grep -Ev '^(M|A| ) (package\.json|README\.md|docs/)' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "Unexpected working tree changes:" >&2
            echo "$UNEXPECTED" >&2
            exit 1
          fi

  publish-prerelease:
    needs: summarize-pr
    if: needs.summarize-pr.outputs.skip != 'true'
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/publish.yml
    with:
      dist-tag: ${{ needs.summarize-pr.outputs.npm_dist_tag }}
      git-ref: ${{ needs.summarize-pr.outputs.head_ref }}
      skip-if-already-published: true
